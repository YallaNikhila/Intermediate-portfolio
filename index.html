<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nikhila Portfolio</title>

    <!-- CSS Link -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Header -->
    <header>

        <h1>Yalla Nikhila</h1>

        <nav>
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#contact">Contact</a>
        </nav>

    </header>

    <!-- Main Content -->
    <main>

        <!-- About Section -->
        <section id="about" class="card">

            <img src="images/profile.jpg" alt="Profile Picture" class="profile-img">

            <div>

                <h2>About Me</h2>

                <p>
                    Hello! I am Yalla Nikhila. I am learning web development and building projects using MERN Stack technologies.
                </p>

            </div>

        </section>

        <!-- Skills Section -->
        <section id="skills" class="card">

            <h2>My Skills</h2>

            <div class="skills-container">

                <div class="skill-box">HTML</div>
                <div class="skill-box">CSS</div>
                <div class="skill-box">JavaScript</div>
                <div class="skill-box">React JS</div>
                <div class="skill-box">Node JS</div>
                <div class="skill-box">MongoDB</div>

            </div>

        </section>

        <!-- Contact Section -->
        <section id="contact" class="card">

            <h2>Contact Me</h2>

            <form>

                <input type="text" placeholder="Enter your name" required>

                <input type="email" placeholder="Enter your email" required>

                <textarea rows="5" placeholder="Enter your message" required>
                </textarea>

                <button type="submit">
                    Send Message
                </button>

            </form>

        </section>

    </main>

    <!-- Footer -->
    <footer>

        <p>© 2026 Yalla Nikhila Portfolio</p>

    </footer>

</body>

</html>
